<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LightPet</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Pet animation preview">
        <div class="topbar">
          <div>
            <h1 id="petName">LightPet</h1>
            <p id="petDescription"></p>
          </div>
          <div class="status" id="frameStatus"></div>
        </div>

        <div class="pet-zone">
          <div class="sprite-backdrop">
            <div id="sprite" class="sprite" aria-live="off"></div>
          </div>
        </div>

        <div class="transport" aria-label="Animation controls">
          <button id="firstFrame" type="button" aria-label="First frame">First</button>
          <button id="prevFrame" type="button" aria-label="Previous frame">Prev</button>
          <button id="playPause" type="button">Pause</button>
          <button id="nextFrame" type="button">Next Frame</button>
          <button id="lastFrame" type="button" aria-label="Last frame">Last</button>
          <label class="loop-control">
            <input id="loopPlayback" type="checkbox" checked />
            <span>Loop</span>
          </label>
          <label class="speed-control">
            <span>Speed</span>
            <select id="speed">
              <option value="0.5">0.5x</option>
              <option value="1" selected>1x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
              <option value="4">4x</option>
            </select>
          </label>
          <label class="scale-control">
            <span>Scale</span>
            <input id="scale" type="range" min="1" max="3" step="0.25" value="2" />
          </label>
        </div>
      </section>

      <section class="panel" aria-label="Animation state selector">
        <h2>States</h2>
        <div id="stateButtons" class="state-grid"></div>
      </section>

      <section class="panel" aria-label="Spritesheet QA">
        <div class="panel-title-row">
          <h2>QA</h2>
          <span id="qaStatus" class="qa-status">Waiting</span>
        </div>
        <div id="qaSummary" class="qa-summary"></div>
      </section>

      <section class="panel" aria-label="Single row override preview">
        <h2>Row Override</h2>
        <div class="override-grid">
          <label>
            <span>Target state</span>
            <select id="overrideState"></select>
          </label>
          <label>
            <span>Generated row strip</span>
            <input id="rowStripFile" type="file" accept="image/png,image/jpeg,image/webp" />
          </label>
          <button id="clearOverride" type="button">Clear</button>
        </div>
        <p id="overrideStatus" class="helper-text">
          Load a generated strip to preview one row without writing package files.
        </p>
      </section>

      <section class="panel" aria-label="Pet manifest">
        <h2>Manifest</h2>
        <form id="manifestForm" class="manifest-form">
          <input
            id="manifestUrl"
            type="text"
            value="../../examples/pets/lulu/pet.json"
            aria-label="Manifest URL"
          />
          <button type="submit">Load</button>
        </form>
        <pre id="manifestJson" class="json-view"></pre>
      </section>

      <section class="panel atlas-panel" aria-label="Spritesheet atlas">
        <div class="panel-title-row">
          <h2>Atlas</h2>
          <span id="atlasMeta"></span>
        </div>
        <div class="atlas-frame">
          <img id="atlasImage" alt="Pet spritesheet atlas" />
        </div>
      </section>

      <section class="panel rows-panel" aria-label="Row frame review">
        <div class="panel-title-row">
          <h2>Rows</h2>
          <span id="rowReviewMeta"></span>
        </div>
        <div id="rowReview" class="row-review"></div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
